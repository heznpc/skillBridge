name: "🐛 Bug Report"
description: "Report a translation error, UI glitch, or broken feature"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Clearly describe the bug"
      placeholder: "What is the bug? What did you observe?"
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: "How can we reproduce this issue?"
      placeholder: |
        1. Navigate to [course/page]
        2. Select language [language]
        3. [Other steps...]
        4. Observe the bug
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs Actual Behavior
      description: "What should happen vs what actually happens"
      placeholder: |
        **Expected:** The text should display as [X]
        **Actual:** The text displays as [Y]
    validations:
      required: true

  - type: input
    id: skilljar-url
    attributes:
      label: Skilljar Page URL
      description: "Which course or page did this occur on?"
      placeholder: "https://anthropic.skilljar.com/..."

  - type: dropdown
    id: language
    attributes:
      label: Language
      description: "Which language is affected?"
      options:
        - "Korean (ko) - Premium"
        - "Japanese (ja) - Premium"
        - "Chinese - Simplified (zh-CN) - Premium"
        - "Spanish (es) - Premium"
        - "French (fr) - Premium"
        - "German (de) - Premium"
        - "Other (Standard)"
    validations:
      required: true

  - type: input
    id: browser-os
    attributes:
      label: Browser & OS
      description: "What browser and operating system are you using?"
      placeholder: "Chrome 124 on Windows 11"

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
      description: "Add any screenshots that help explain the problem"
      placeholder: "Paste screenshots here or describe what we should see"
