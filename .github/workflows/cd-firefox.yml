name: CD — Firefox AMO Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip file-change check and deploy regardless'
        required: false
        default: 'false'

concurrency:
  group: amo-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if deploy-relevant files changed
        id: changes
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Force deploy requested."
            exit 0
          fi

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            MERGE_BASE=$(git merge-base HEAD~1 HEAD 2>/dev/null || echo "HEAD~1")
            CHANGED=$(git diff --name-only "$MERGE_BASE" HEAD)
          else
            CHANGED=$(git diff --name-only HEAD)
          fi

          if echo "$CHANGED" | grep -qE '^(manifest\.json|src/|_locales/|assets/icons/)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deploy-relevant changes detected."
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "No deploy-relevant files changed, skipping."
          fi

      - name: Check AMO secrets configured
        if: steps.changes.outputs.should_deploy == 'true'
        id: secrets
        run: |
          if [ -z "${{ secrets.AMO_API_KEY }}" ] || [ -z "${{ secrets.AMO_API_SECRET }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::error::AMO secrets not configured — set AMO_API_KEY and AMO_API_SECRET in repo Settings > Secrets."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.secrets.outputs.configured == 'true'
        run: npm ci

      - name: Extract version from manifest
        if: steps.secrets.outputs.configured == 'true'
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying v$VERSION"

      - name: Build Firefox zip
        if: steps.secrets.outputs.configured == 'true'
        run: |
          mkdir -p store-assets
          npm run build:firefox:zip
          echo "Built store-assets/skillbridge-firefox.zip"

      - name: Submit to AMO via web-ext
        if: steps.secrets.outputs.configured == 'true'
        run: |
          npx web-ext@8 sign \
            --source-dir=dist/firefox \
            --channel=listed \
            --api-key=${{ secrets.AMO_API_KEY }} \
            --api-secret=${{ secrets.AMO_API_SECRET }} \
            --id=skillbridge@heznpc

      - name: Upload zip as artifact
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: skillbridge-firefox-v${{ steps.version.outputs.version }}
          path: store-assets/skillbridge-firefox.zip
          retention-days: 14
