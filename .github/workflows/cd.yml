name: CD — Chrome Web Store Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy when CI succeeded and relevant files changed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if deploy-relevant files changed
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "manifest.json")
          if echo "$CHANGED" | grep -qE '^(manifest\.json|src/|_locales/|assets/icons/)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "No deploy-relevant files changed, skipping."
          fi

      - name: Extract version from manifest
        if: steps.changes.outputs.should_deploy == 'true'
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

      - name: Build zip
        if: steps.changes.outputs.should_deploy == 'true'
        run: |
          mkdir -p store-assets
          zip -r store-assets/skillbridge.zip manifest.json _locales/ src/ assets/icons/ -x '*.DS_Store'
          echo "✓ Built store-assets/skillbridge.zip"

      - name: Upload to Chrome Web Store
        if: steps.changes.outputs.should_deploy == 'true'
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: store-assets/skillbridge.zip
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true

      - name: Upload zip as artifact
        if: steps.changes.outputs.should_deploy == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: skillbridge-v${{ steps.version.outputs.version }}
          path: store-assets/skillbridge.zip
