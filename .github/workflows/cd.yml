name: CD — Chrome Web Store Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish after upload (true = live, false = draft only)'
        required: false
        default: 'false'
      force:
        description: 'Skip file-change check and deploy regardless'
        required: false
        default: 'false'

concurrency:
  group: cws-deploy
  cancel-in-progress: false

# Top-level least-privilege. The deploy job escalates id-token (for SLSA
# build provenance) and contents (for the cws-vN tag push) at the job
# level; nothing else needs write access.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Job-level gate. The first half is the existing trigger filter
    # (manual dispatch or successful CI). The second half is the
    # publication-pause guard: every push to manifest.json / src/* would
    # otherwise try to publish before the dashboard-only listing/privacy/media
    # fields are refreshed. Flip `CWS_PUBLICATION_PAUSED` off only after the
    # dashboard is ready, then set `CWS_DASHBOARD_READY_VERSION` to the manifest
    # version. Manual `force=true` still bypasses the pause for one-off recovery.
    if: >-
      (github.event_name == 'workflow_dispatch'
        || github.event.workflow_run.conclusion == 'success')
      && (vars.CWS_PUBLICATION_PAUSED != 'true'
        || github.event.inputs.force == 'true')
    permissions:
      contents: write        # for `git push origin cws-v${VERSION}` tag
      id-token: write        # for actions/attest-build-provenance OIDC
      attestations: write    # for the attestation upload step

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Check if deploy-relevant files changed
        id: changes
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Force deploy requested."
            exit 0
          fi

          # For merge commits (PRs), compare against the merge base
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            MERGE_BASE=$(git merge-base HEAD~1 HEAD 2>/dev/null || echo "HEAD~1")
            CHANGED=$(git diff --name-only "$MERGE_BASE" HEAD)
          else
            CHANGED=$(git diff --name-only HEAD)
          fi

          if echo "$CHANGED" | grep -qE '^(manifest\.json|src/|_locales/|assets/icons/)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deploy-relevant changes detected."
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "No deploy-relevant files changed, skipping."
          fi

      - name: Check CWS secrets configured
        if: steps.changes.outputs.should_deploy == 'true'
        id: secrets
        run: |
          if [ -z "${{ secrets.CWS_EXTENSION_ID }}" ] || [ -z "${{ secrets.CWS_CLIENT_ID }}" ] || \
             [ -z "${{ secrets.CWS_CLIENT_SECRET }}" ] || [ -z "${{ secrets.CWS_REFRESH_TOKEN }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::error::CWS secrets not configured — set CWS_EXTENSION_ID, CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN in repo Settings > Secrets."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version from manifest
        if: steps.secrets.outputs.configured == 'true'
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying v$VERSION"

      - name: Resolve publish mode
        if: steps.secrets.outputs.configured == 'true'
        id: publish_mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish || 'false' }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PUBLISH="$INPUT_PUBLISH"
          else
            PUBLISH="true"
          fi
          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"
          echo "publish=$PUBLISH"

      - name: Check CWS target is SkillBridge
        if: steps.secrets.outputs.configured == 'true'
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          EXPECTED_ID=$(node - <<'NODE'
          const fs = require('fs');
          const src = fs.readFileSync('scripts/check-cws-drift.js', 'utf8');
          const match = src.match(/const CWS_EXTENSION_ID = '([^']+)'/);
          if (!match) {
            console.error('Could not read the expected SkillBridge CWS listing id from scripts/check-cws-drift.js');
            process.exit(1);
          }
          process.stdout.write(match[1]);
          NODE
          )
          if [ "$CWS_EXTENSION_ID" != "$EXPECTED_ID" ]; then
            echo "::error::CWS_EXTENSION_ID does not match the SkillBridge listing used by scripts/check-cws-drift.js. Refusing to upload; check repo secrets for cross-project contamination."
            exit 1
          fi

      - name: Check dashboard-ready version before live publish
        if: steps.secrets.outputs.configured == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PUBLISH_LIVE: ${{ steps.publish_mode.outputs.publish }}
          DASHBOARD_READY_VERSION: ${{ vars.CWS_DASHBOARD_READY_VERSION }}
        run: |
          if [ "$PUBLISH_LIVE" != "true" ]; then
            echo "Draft upload requested; dashboard-ready version guard is not required."
            exit 0
          fi
          if [ "$DASHBOARD_READY_VERSION" != "$VERSION" ]; then
            echo "::error::Set repo variable CWS_DASHBOARD_READY_VERSION=$VERSION after refreshing CWS listing copy, screenshots, icon, and privacy practices. Refusing live publish while dashboard-visible fields may be stale."
            exit 1
          fi

      - name: Skip if version was already deployed
        if: steps.secrets.outputs.configured == 'true' && github.event.inputs.force != 'true'
        id: tag_guard
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PUBLISH_LIVE: ${{ steps.publish_mode.outputs.publish }}
        run: |
          if [ "$PUBLISH_LIVE" != "true" ]; then
            echo "Draft upload requested; skipping live cws-v tag guard."
            echo "should_upload=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG="cws-v${VERSION}"
          git fetch --tags --depth=1 origin "refs/tags/${TAG}:refs/tags/${TAG}" 2>/dev/null || true
          if git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "::notice::${TAG} already exists on origin — v${VERSION} was already deployed. Skipping upload. Bump manifest.json version or re-run with force=true to override."
            echo "should_upload=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_upload=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.secrets.outputs.configured == 'true' && steps.tag_guard.outputs.should_upload != 'false'
        run: npm ci

      - name: Build bundled zip
        if: steps.secrets.outputs.configured == 'true' && steps.tag_guard.outputs.should_upload != 'false'
        run: |
          mkdir -p store-assets
          npm run build:bundle:zip
          SIZE=$(du -h store-assets/skillbridge-bundled.zip | cut -f1)
          echo "Built store-assets/skillbridge-bundled.zip ($SIZE)"

      # SLSA build provenance for the bundled .zip — generated *before* upload so
      # the attestation is published whether or not CWS accepts the bundle.
      # Future Chrome Web Store / supply-chain reviewers can verify the
      # zip was built from this workflow run, in this repo, at this SHA.
      - name: Attest CWS zip build provenance
        if: steps.secrets.outputs.configured == 'true' && steps.tag_guard.outputs.should_upload != 'false'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: store-assets/skillbridge-bundled.zip

      - name: Upload to Chrome Web Store
        if: steps.secrets.outputs.configured == 'true' && steps.tag_guard.outputs.should_upload != 'false'
        uses: mnao305/chrome-extension-upload@fdfe79400af990f5145a319e834aee64907ccff4  # v6.0.0
        with:
          file-path: store-assets/skillbridge-bundled.zip
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: ${{ steps.publish_mode.outputs.publish }}

      - name: Tag version on successful live publish
        if: steps.secrets.outputs.configured == 'true' && steps.tag_guard.outputs.should_upload != 'false' && steps.publish_mode.outputs.publish == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git tag "cws-v${VERSION}"
          git push origin "cws-v${VERSION}"

      - name: Upload zip as artifact
        if: steps.secrets.outputs.configured == 'true' && steps.tag_guard.outputs.should_upload != 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: skillbridge-v${{ steps.version.outputs.version }}
          path: store-assets/skillbridge-bundled.zip
          retention-days: 14
