name: CD — Chrome Web Store Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish after upload (true = live, false = draft only)'
        required: false
        default: 'true'
      force:
        description: 'Skip file-change check and deploy regardless'
        required: false
        default: 'false'

concurrency:
  group: cws-deploy
  cancel-in-progress: false

# Top-level least-privilege. The deploy job escalates id-token (for SLSA
# build provenance) and contents (for the cws-vN tag push) at the job
# level; nothing else needs write access.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Job-level gate. The first half is the existing trigger filter
    # (manual dispatch or successful CI). The second half is the
    # publication-pause guard: while the CWS listing is removed pending
    # icon redesign (see README.md "Installation" + POSITIONING.md
    # "Blockers before outreach"), every push to manifest.json / src/*
    # would otherwise fail with HTTP 400 from CWS and bury real
    # regressions under red Xs. Flip the repo variable
    # `CWS_PUBLICATION_PAUSED` to `false` (or unset) on re-publication
    # day, or pass `force=true` via workflow_dispatch to bypass once.
    if: >-
      (github.event_name == 'workflow_dispatch'
        || github.event.workflow_run.conclusion == 'success')
      && (vars.CWS_PUBLICATION_PAUSED != 'true'
        || github.event.inputs.force == 'true')
    permissions:
      contents: write        # for `git push origin cws-v${VERSION}` tag
      id-token: write        # for actions/attest-build-provenance OIDC
      attestations: write    # for the attestation upload step

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Check if deploy-relevant files changed
        id: changes
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Force deploy requested."
            exit 0
          fi

          # For merge commits (PRs), compare against the merge base
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            MERGE_BASE=$(git merge-base HEAD~1 HEAD 2>/dev/null || echo "HEAD~1")
            CHANGED=$(git diff --name-only "$MERGE_BASE" HEAD)
          else
            CHANGED=$(git diff --name-only HEAD)
          fi

          if echo "$CHANGED" | grep -qE '^(manifest\.json|src/|_locales/|assets/icons/)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deploy-relevant changes detected."
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "No deploy-relevant files changed, skipping."
          fi

      - name: Check CWS secrets configured
        if: steps.changes.outputs.should_deploy == 'true'
        id: secrets
        run: |
          if [ -z "${{ secrets.CWS_EXTENSION_ID }}" ] || [ -z "${{ secrets.CWS_CLIENT_ID }}" ] || \
             [ -z "${{ secrets.CWS_CLIENT_SECRET }}" ] || [ -z "${{ secrets.CWS_REFRESH_TOKEN }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::error::CWS secrets not configured — set CWS_EXTENSION_ID, CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN in repo Settings > Secrets."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version from manifest
        if: steps.secrets.outputs.configured == 'true'
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying v$VERSION"

      - name: Skip if version was already deployed
        if: steps.secrets.outputs.configured == 'true' && github.event.inputs.force != 'true'
        id: tag_guard
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="cws-v${VERSION}"
          git fetch --tags --depth=1 origin "refs/tags/${TAG}:refs/tags/${TAG}" 2>/dev/null || true
          if git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "::notice::${TAG} already exists on origin — v${VERSION} was already deployed. Skipping upload. Bump manifest.json version or re-run with force=true to override."
            echo "should_upload=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_upload=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build zip
        if: steps.secrets.outputs.configured == 'true' && steps.tag_guard.outputs.should_upload != 'false'
        run: |
          mkdir -p store-assets
          zip -r store-assets/skillbridge.zip manifest.json _locales/ src/ assets/icons/ -x '*.DS_Store'
          SIZE=$(du -h store-assets/skillbridge.zip | cut -f1)
          echo "Built store-assets/skillbridge.zip ($SIZE)"

      # SLSA build provenance for the .zip — generated *before* upload so
      # the attestation is published whether or not CWS accepts the bundle.
      # Future Chrome Web Store / supply-chain reviewers can verify the
      # zip was built from this workflow run, in this repo, at this SHA.
      - name: Attest CWS zip build provenance
        if: steps.secrets.outputs.configured == 'true' && steps.tag_guard.outputs.should_upload != 'false'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: store-assets/skillbridge.zip

      - name: Upload to Chrome Web Store
        if: steps.secrets.outputs.configured == 'true' && steps.tag_guard.outputs.should_upload != 'false'
        uses: mnao305/chrome-extension-upload@4008e29e13c144d0f6725462cbd49b7c291b4928  # v5.0.0
        with:
          file-path: store-assets/skillbridge.zip
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: ${{ github.event.inputs.publish || 'true' }}

      - name: Tag version on successful upload
        if: steps.secrets.outputs.configured == 'true' && steps.tag_guard.outputs.should_upload != 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git tag "cws-v${VERSION}"
          git push origin "cws-v${VERSION}"

      - name: Upload zip as artifact
        if: steps.secrets.outputs.configured == 'true' && steps.tag_guard.outputs.should_upload != 'false'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: skillbridge-v${{ steps.version.outputs.version }}
          path: store-assets/skillbridge.zip
          retention-days: 14
