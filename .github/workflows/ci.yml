name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate manifest.json
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8')); console.log('✓ manifest.json is valid')"

      - name: Validate language JSON files
        run: |
          status=0
          for f in src/data/*.json; do
            if node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
              echo "✓ $f"
            else
              echo "✗ $f — invalid JSON"
              status=1
            fi
          done
          exit $status

      - name: Check for common JSON issues
        run: |
          node -e "
            const fs = require('fs');
            const files = fs.readdirSync('src/data').filter(f => f.endsWith('.json'));
            let ok = true;
            for (const file of files) {
              const data = JSON.parse(fs.readFileSync('src/data/' + file, 'utf8'));
              // Every lang file must have _meta section
              if (!data._meta) {
                console.log('✗ src/data/' + file + ' — missing _meta section');
                ok = false;
              }
              // Every lang file should have _protected section
              if (!data._protected) {
                console.log('⚠ src/data/' + file + ' — missing _protected section (recommended)');
              }
              // Check for empty string values
              let emptyCount = 0;
              const check = (obj, path) => {
                for (const [k, v] of Object.entries(obj)) {
                  if (typeof v === 'string' && v === '' && k !== '') {
                    emptyCount++;
                  } else if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
                    check(v, path + '.' + k);
                  }
                }
              };
              check(data, file);
              if (emptyCount > 0) {
                console.log('⚠ src/data/' + file + ' — ' + emptyCount + ' empty string values');
              }
            }
            if (!ok) process.exit(1);
            console.log('✓ All language files pass structural checks');
          "

      - name: Lint JavaScript (warnings only)
        run: |
          npx eslint@8 src/ \
            --no-eslintrc \
            --env browser,es2021,webextensions \
            --parser-options=ecmaVersion:2022 \
            --rule '{"no-undef":"off","no-unused-vars":"warn","no-redeclare":"error","no-dupe-keys":"error"}' \
            --max-warnings 50 || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test dependencies
        run: npm install --save-dev jest

      - name: Run tests
        run: npx jest --passWithNoTests
