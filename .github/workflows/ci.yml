name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Top-level least-privilege. CI is pure read; no job escalates.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Validate manifest.json
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8')); console.log('✓ manifest.json is valid')"

      - name: Validate language JSON files
        run: |
          status=0
          for f in src/data/*.json; do
            if node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
              echo "✓ $f"
            else
              echo "✗ $f — invalid JSON"
              status=1
            fi
          done
          exit $status

      - name: Validate translation files
        run: node scripts/validate-translations.js

      - name: Check glossary consistency
        run: node scripts/check-glossary.js

      - name: Check i18n key coverage
        run: node scripts/check-i18n-keys.js

      - name: Check dictionary coverage (POSITIONING.md "48h" SLA)
        run: node scripts/check-dict-coverage.js

      - name: Check shared constants sync
        run: node scripts/check-bg-sync.js

      - name: Check dictionary freshness
        run: node scripts/check-dicts.js

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npx eslint src/ tests/ scripts/

      - name: Check formatting
        run: npx prettier --check 'src/**/*.{js,css,html}' 'tests/**/*.js' 'scripts/**/*.js'

      - name: DOM health check (Skilljar selectors)
        run: node scripts/check-selectors.js
        env:
          CI: 'true'

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Firefox artifact
        run: npm run build:firefox

      - name: Build bundled artifact
        run: npm run build:bundle

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx jest --passWithNoTests

  e2e:
    # Playwright E2E. Loads the actual built extension into headed Chromium
    # under xvfb so MV3 content scripts inject reliably (the new chromium
    # headless mode in --load-extension still has flake we'd rather avoid).
    # Catches the class of cross-module wiring bug that unit tests miss
    # (see tests/e2e/golden-translation.spec.js header for the rationale).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache Playwright Chromium binary so re-runs skip the ~120MB download.
      # Key on package-lock.json so a @playwright/test version bump invalidates.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install xvfb (always) + Playwright Chromium (conditional)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install --with-deps chromium
          else
            # Cache hit — only install OS deps for the cached browser.
            npx playwright install-deps chromium
          fi

      - name: Build extension bundle
        run: npm run build:bundle

      - name: Run E2E suite under xvfb
        run: xvfb-run -a npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
