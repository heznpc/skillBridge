name: Chrome Web Store publish drift watcher

# Runs `scripts/check-cws-drift.js` against the live SkillBridge CWS
# listing and auto-opens an issue when the published version drifts
# materially behind `manifest.json`.
#
# Why this exists
# ---------------
#
# The 2026-05-29 market-pulse fetch surfaced a 3-month publish drift:
# `manifest.json` was at v3.5.34 while the CWS listing had been frozen
# at v1.0.1 (2026-03-10) since before the Italian Premium dictionary,
# the AI-content gate, the trademark sweep, and the audit series all
# landed on `main`. None of that reached users until a dashboard re-
# upload. Nothing in CI noticed.
#
# This workflow runs weekly + on push to main + on manual dispatch. A
# drift detection opens (or re-opens) a single issue with the actual
# version delta and a pointer to `store-assets/RELEASE_CHECKLIST.md`
# for the dashboard upload step. Idempotent — mirrors
# `selectors-drift.yml` and `academy-courses-drift.yml`.
#
# Security note: this workflow only runs static commands (`npm run
# check:cws-drift`, `node scripts/check-cws-drift.js --json`). It does
# NOT interpolate any github.event.* fields into shell strings, so the
# common workflow-injection vectors do not apply here.

on:
  schedule:
    - cron: '30 6 * * 1' # weekly: every Monday 06:30 UTC (15:30 KST)
  push:
    branches: [main]
    paths:
      - 'manifest.json'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Check CWS listing vs local manifest version
        id: check
        # Run the script directly (not via `npm run`) so stdout is pure JSON.
        # `npm run` prefixes its own banner lines, which would break the
        # JSON.parse in the next step.
        #
        # `set +e` because the script's exit codes carry meaning:
        #   1 = drift detected (open release issue)
        #   0 with status:soft-fail = parser/network miss (open degraded issue)
        #   0 with status:ok        = nothing to do
        # `continue-on-error` keeps GH from flagging the whole job as failed
        # for the parser-miss case (which is expected on CI runner IPs since
        # CWS serves different markup to those — see PR #147).
        continue-on-error: true
        run: |
          set +e
          node scripts/check-cws-drift.js --json > drift-report.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat drift-report.json
          # Extract status into an output for the issue-creation step.
          STATUS=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('drift-report.json','utf8')).status||'unknown')}catch{console.log('parse-fail')}")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Resolved status: $STATUS"

      - name: Open CWS-publish-drift issue (idempotent)
        if: steps.check.outputs.status == 'drift'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            // Drift report was already written to disk by the previous step.
            let report;
            try {
              report = JSON.parse(fs.readFileSync('drift-report.json', 'utf8'));
            } catch (err) {
              report = { status: 'parse-fail', error: err.message };
            }

            const title = '🚨 Chrome Web Store publish drift — re-upload needed';

            // Idempotency: skip if an open drift issue already exists.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            if (existing.data.some(i => i.title === title)) {
              core.info('A CWS-drift issue is already open; skipping the create.');
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '`scripts/check-cws-drift.js` reports the published Chrome Web Store listing has drifted materially behind `manifest.json` on `main`.',
              '',
              '**Drift report**:',
              '```json',
              JSON.stringify(report, null, 2),
              '```',
              '',
              '**Why this matters**: every PR that lands on `main` without a CWS dashboard re-upload is invisible to users. The 2026-05-29 audit surfaced a 3-month drift (1.0.1 → 3.5.34) — that meant the Italian Premium dictionary, AI-content gate, trademark sweep, and entire audit series sat on `main` without reaching users.',
              '',
              '**Action**:',
              '1. `npm run build:bundle:zip` — regenerates `store-assets/skillbridge-bundled.zip`.',
              '2. Upload the zip via the CWS developer dashboard (`store-assets/RELEASE_CHECKLIST.md` has the step-by-step).',
              '3. After the listing goes live, re-run this workflow via `workflow_dispatch` to confirm drift is cleared.',
              '4. Close this issue. The cron will re-open one only if drift recurs.',
              '',
              `Workflow run: ${runUrl}`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['cws-drift', 'release', 'priority:high'],
            });

      - name: Note soft-fail (log only — do NOT open an issue)
        # On GitHub-runner IPs the CWS listing is bot-detected and served
        # different markup, so the script soft-fails (parser-miss) on
        # essentially every scheduled run. That is a permanent, known
        # condition — not new signal — so opening a "degraded watcher" issue
        # each time was pure recurring noise (see #149). We log it to the run
        # annotations instead. The authoritative drift check is
        # `npm run check:cws-drift` from a developer machine, which works
        # (it correctly reports drift/ok off-CI).
        if: steps.check.outputs.status == 'soft-fail'
        run: |
          echo "::notice title=CWS drift soft-fail::CWS bot-detects CI runner IPs, so the drift check cannot read the listing here. This is expected and not actionable on CI. Run 'npm run check:cws-drift' locally for an authoritative answer."
          cat drift-report.json || true
