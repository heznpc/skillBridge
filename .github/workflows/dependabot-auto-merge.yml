name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write
  issues: write # `gh label create` (below) writes repo labels, an Issues-scoped resource

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor/patch updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label major updates for manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        # This job runs without actions/checkout, so `gh` cannot infer the repo
        # from a local git remote. Without GH_REPO the first `gh label create`
        # aborts with "fatal: not a git repository" (exit 1 under `bash -e`),
        # which is why every major bump landed in an UNSTABLE state — the label
        # commands never ran. GH_REPO lets gh resolve owner/repo directly;
        # `gh label create --force` is create-or-update and idempotent.
        run: |
          gh label create dependencies --color 0366D6 --description "Pull requests that update a dependency file" --force
          gh label create manual-review --color FBCA04 --description "Dependabot major update needs manual review" --force
          gh pr edit "$PR_URL" --add-label "dependencies,manual-review"
        env:
          GH_REPO: ${{ github.repository }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
