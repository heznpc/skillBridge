name: Academy course catalog drift watcher

# Runs `scripts/check-academy-courses.js` against the live Anthropic
# Academy catalog (anthropic.skilljar.com) every 12 hours and auto-
# opens an issue when a new course slug appears that is not wired
# into `FLASHCARD_COURSE_MAP` in `src/lib/constants.js`.
#
# This is the load-bearing automation behind POSITIONING.md's first
# pillar — "AI terminology fidelity — new Academy course → terminology
# update within 48 hours." Before this workflow, the SLA was honor-
# system: Anthropic could publish a course on Monday morning and we
# would only learn about it via a user GitHub issue, days later.
#
# Idempotent (mirrors `.github/workflows/selectors-drift.yml`): a
# persistent gap doesn't spawn duplicate issues; we re-issue only
# after the existing issue closes and drift recurs.

on:
  schedule:
    # Every 12 hours — twice daily, covering both US and APAC business
    # days within the 48h SLA window with substantial slack. Coarser
    # than selectors-drift (6h) because course-launches are a slower
    # cadence than DOM redeploys.
    - cron: '15 */12 * * *'
  workflow_dispatch: # manual trigger from Actions UI

permissions:
  contents: read
  issues: write # for auto-opened drift issues

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version-file: '.nvmrc'

      - name: Check Academy catalog against FLASHCARD_COURSE_MAP
        id: check
        run: node scripts/check-academy-courses.js
        env:
          CI: 'true'

      - name: Open new-course-detected issue (idempotent)
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const fs = require('fs');
            let report = '(no academy-courses-report.txt produced)';
            try {
              report = fs.readFileSync('academy-courses-report.txt', 'utf8').slice(0, 4000);
            } catch (e) { /* file missing — script may have crashed before writing */ }

            const title = '🆕 New Anthropic Academy course detected — terminology update needed';

            // Idempotency: skip if there's already an open drift issue.
            // Without this, a persistent gap would spawn a new issue
            // every 12 hours until someone finishes the per-language
            // dictionary work.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            if (existing.data.some(i => i.title === title)) {
              core.info('A course-drift issue is already open; skipping the create.');
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '`scripts/check-academy-courses.js` found one or more course slugs on https://anthropic.skilljar.com/ that are not present in `FLASHCARD_COURSE_MAP` (`src/lib/constants.js`).',
              '',
              '**Why this matters**: POSITIONING.md pillar #1 commits to "AI terminology fidelity — new Academy course → terminology update within 48 hours." A slug that exists on the live site but not in our map ships the English fallback to non-English users for that course.',
              '',
              '**Action**:',
              '1. For each new slug below, add a course section to all 10 premium-language dictionaries in `src/data/` (use a sibling section like `aiFluencyEdu` as a template).',
              '2. Add a `\'slug\': [\'sectionName\']` row to `FLASHCARD_COURSE_MAP` in `src/lib/constants.js`.',
              '3. Run `npm run check:dict-coverage` locally — it must pass before merge.',
              '4. Run `npm run check:academy` locally to confirm this script now reports zero unknowns.',
              '',
              '**Report**:',
              '```',
              report,
              '```',
              '',
              `Workflow run: ${runUrl}`,
              '',
              '_Close this issue after the dict + map updates land; the cron will re-open one only if a fresh course appears._',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['academy-drift', 'i18n', 'priority:high'],
            });
