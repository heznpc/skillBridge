name: Academy course catalog drift watcher

# Runs `scripts/check-academy-courses.js` against the live Anthropic
# Academy catalog (anthropic.skilljar.com) every 12 hours and auto-
# opens an issue when a new course slug appears that is not wired
# into `FLASHCARD_COURSE_MAP` in `src/lib/constants.js`, or when the
# Chrome Web Store listing copy falls behind the live catalog count.
#
# This is the load-bearing automation behind the product's first
# pillar — "AI terminology fidelity — new Academy course → terminology
# update within 48 hours." Before this workflow, the SLA was honor-
# system: Anthropic could publish a course on Monday morning and we
# would only learn about it via a user GitHub issue, days later.
#
# Idempotent (mirrors `.github/workflows/selectors-drift.yml`): a
# persistent gap doesn't spawn duplicate issues; we re-issue only
# after the existing issue closes and drift recurs.

on:
  # Re-enabled 2026-06-01: the scraper parses the current catalog correctly
  # again (check-academy-courses.js passes after wiring the new course), so the
  # 12-hour watch behind the "new course -> 48h" SLA is restored.
  schedule:
    - cron: '15 */12 * * *'
  workflow_dispatch: # manual trigger from Actions UI

permissions:
  contents: read
  issues: write # for auto-opened drift issues

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Check Academy catalog against FLASHCARD_COURSE_MAP
        id: check
        run: node scripts/check-academy-courses.js
        env:
          CI: 'true'

      - name: Open new-course-detected issue (idempotent)
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            let report = '(no academy-courses-report.txt produced)';
            try {
              report = fs.readFileSync('academy-courses-report.txt', 'utf8').slice(0, 4000);
            } catch (e) { /* file missing — script may have crashed before writing */ }

            const title = '🆕 Anthropic Academy catalog drift — terminology/store listing update needed';

            // Idempotency: skip if there's already an open drift issue.
            // Without this, a persistent gap would spawn a new issue
            // every 12 hours until someone finishes the per-language
            // dictionary work.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            if (existing.data.some(i => i.title === title)) {
              core.info('A course-drift issue is already open; skipping the create.');
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '`scripts/check-academy-courses.js` found drift between https://anthropic.skilljar.com/, `FLASHCARD_COURSE_MAP` (`src/lib/constants.js`), and/or the Chrome Web Store listing source (`store-assets/STORE_LISTING.md`).',
              '',
              '**Why this matters**: the product's first pillar commits to "AI terminology fidelity — new Academy course → terminology update within 48 hours." A slug that exists on the live site but not in our map ships the English fallback to non-English users for that course. A stale store-listing count misleads users and reviewers about current coverage.',
              '',
              '**Action**:',
              '1. For each new slug below, add a course section to all 12 premium-language dictionaries in `src/data/` (use a sibling section like `aiFluencyEdu` as a template).',
              '2. Add a `\'slug\': [\'sectionName\']` row to `FLASHCARD_COURSE_MAP` in `src/lib/constants.js`.',
              '3. If the report names `STORE_LISTING.md`, update the supported-course count/list and regenerate store assets before release.',
              '4. Run `npm run check:dict-coverage` and `npm run check:academy` locally — both must pass before merge.',
              '',
              '**Report**:',
              '```',
              report,
              '```',
              '',
              `Workflow run: ${runUrl}`,
              '',
              '_Close this issue after the dict + map updates land; the cron will re-open one only if a fresh course appears._',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['academy-drift', 'i18n', 'priority:high'],
            });
