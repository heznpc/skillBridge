<?xml version="1.0" encoding="UTF-8"?>
<!--
  SkillBridge — AI Course Translator (icon v2, 2026-05-28)

  Design constraints, anchored to the 2026-05-12 Tracer / Anthropic
  trademark complaint about the v1 icon's similarity to the Claude
  design mark (TM-DESIGN-Claude Logo-8061956-{42}-US):
    - NO orange / amber palette (Claude family #cc785c–#e07a5f)
    - NO octagonal frame or 8-point-star motif
    - NO minimal geometric AI-brand-mark resemblance
    - Distinct identity rooted in "translation / bridge" semantics
    - Legible at 16x16 (CWS toolbar size) — single dominant glyph

  Concept:
    Teal-on-cream background with a single white bridge arch that doubles
    as a stylized "S" curve. Two reading dots flank the arch (one on each
    side) — the visual cue for "two languages bridged". The S-arch reads
    as both "SkillBridge" wordmark anchor and as a translation bridge,
    without any text that would have to be re-rendered per locale.

  Palette:
    bg-deep:   #0d9488  (teal-600, far from Claude orange in hue)
    bg-mid:    #14b8a6  (teal-500, used for the inner gradient stop)
    arch:      #f8fafc  (slate-50, near-white, high contrast at 16px)
    dot-left:  #fde047  (yellow-300, "source language" indicator)
    dot-right: #f472b6  (pink-400,   "target language" indicator)

  v1 status: this SVG is the source-of-truth. A designer pass to round
  the arch terminals or tune the dot positions is welcome — the
  important properties (no Claude visual lineage, 16px legibility,
  translation semantics) are encoded in the structure.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square plate. 18px corner radius matches CWS family convention. -->
  <rect x="0" y="0" width="128" height="128" rx="22" ry="22" fill="url(#bg)"/>

  <!-- The bridge / S arch.
       Two arcs anchored to opposite baselines; together they form an
       S-curve that reads as a suspension bridge silhouette at glance
       distance, and as the "S" of SkillBridge at closer reading. -->
  <path
    d="M 24 88
       C 24 60, 56 60, 64 80
       C 72 100, 104 100, 104 72"
    stroke="#f8fafc"
    stroke-width="14"
    stroke-linecap="round"
    fill="none"/>

  <!-- Two reading dots — the "two languages" indicators flanking
       the bridge. Sized to remain visible at 32px and to disappear
       gracefully at 16px (where they reduce to a single bright
       pixel each, still readable as "two anchors"). -->
  <circle cx="24"  cy="88" r="7" fill="#fde047"/>
  <circle cx="104" cy="72" r="7" fill="#f472b6"/>
</svg>
