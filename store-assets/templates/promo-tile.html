<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    /* CWS small promo tile, exactly 440×280. SkillBridge brand: navy + coral.
       Icon is the current half-sun + bridge mark (assets/icons/icon128.png). */
    html, body { margin: 0; }
    .tile {
      width: 440px; height: 280px; position: relative; overflow: hidden;
      background: linear-gradient(150deg, #3d405b 0%, #2b2d44 100%);
      color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column; justify-content: center; padding: 0 34px; box-sizing: border-box;
    }
    .row { display: flex; align-items: center; gap: 15px; margin-bottom: 16px; }
    .icon { width: 60px; height: 60px; border-radius: 14px; background: rgba(255,255,255,.12);
      padding: 8px; box-sizing: border-box; }
    .icon img { width: 100%; height: 100%; display: block; object-fit: contain; }
    .name { font-size: 28px; font-weight: 800; letter-spacing: .2px; }
    .name .accent { color: #f2cc8f; }
    .tagline { font-size: 16px; line-height: 1.45; color: #e9e7f0; max-width: 372px; }
    .disclaimer { position: absolute; left: 34px; bottom: 15px; font-size: 10.5px; color: #b9b6c7; opacity: .9; }
  </style>
</head>
<body>
  <div class="tile">
    <div class="row">
      <div class="icon"><img src="../../assets/icons/icon128.png" alt="" /></div>
      <div class="name">Skill<span class="accent">Bridge</span></div>
    </div>
    <div class="tagline">{{TAGLINE}}</div>
    <div class="disclaimer">{{DISCLAIMER}}</div>
  </div>
</body>
</html>
