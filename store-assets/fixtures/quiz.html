<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- The (invisible) <title> carries two AI keywords — "Claude" + "prompt
       engineering" — so the extension's AI-content gate (≥2 keywords across
       title/h1/breadcrumb/body) activates on this otherwise sparse quiz page,
       just as the real anthropic.skilljar.com tenant does. Without it the
       extension pauses ("non-AI tenant") and nothing translates. -->
  <title>Building with the Claude API — Prompt Engineering Quiz</title>
  <!--
    STORE-SCREENSHOT FIXTURE for the exam-safe scene. Served at a /quiz path so
    detectExamPage() trips on the URL; .quiz-form + .answer-option are redundant
    DOM fallbacks. Same generic "Academy" chrome as lesson.html (trademark-safe).
    The exam-safe contract: title + question translate, answer options DO NOT.
  -->
  <style>
    :root { --ink:#1f1e1b; --muted:#69655f; --accent:#d96f52; --line:#dedad3; --bg:#f8f7f3; }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body { font-family:Arial,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:var(--ink); background:var(--bg); }
    /* Neutral test host; this is not a facsimile of the live Skilljar header. */
    .site-header { background:var(--bg); color:var(--ink); display:flex; align-items:center; justify-content:flex-end; padding:0 30px; height:64px; border-bottom:1px solid var(--line); }
    #header-right { margin-left:auto; display:flex; align-items:center; gap:18px; }
    .header-links-container { display:flex; gap:30px; }
    .header-links-container a { color:var(--ink); text-decoration:none; font-size:15px; }
    #si18n-header-lang select { padding:8px 12px; border-radius:7px; border:1px solid var(--line); background:#fff; color:var(--ink); font-size:13px; }
    main { max-width:820px; margin:58px auto; padding:0 28px; }
    .eyebrow { color:var(--muted); font-weight:600; font-size:13px; letter-spacing:.02em; }
    h1 { font-family:Georgia,'Times New Roman',serif; font-size:42px; font-weight:400; margin:12px 0 22px; letter-spacing:-.02em; }
    #quiz-question { font-size:18px; line-height:1.5; margin:0 0 22px; font-weight:600; }
    .quiz-form { display:flex; flex-direction:column; gap:12px; }
    .answer-option { display:flex; align-items:center; gap:12px; padding:17px 18px; background:#fff;
      border:1px solid var(--line); border-radius:3px; font-size:15px; cursor:pointer; }
    .answer-option:hover { border-color:var(--accent); }
    .answer-option input { accent-color:var(--accent); width:17px; height:17px; }
  </style>
</head>
<body>
  <header class="site-header">
    <div id="header-right">
      <div class="header-links-container">
        <a href="#">Academy</a>
        <a href="#">Courses</a>
      </div>
    </div>
  </header>

  <main id="lesson-main">
    <div class="eyebrow">Building with the Claude API / Knowledge check</div>
    <h1 id="quiz-title">Claude Fundamentals Quiz</h1>
    <p id="quiz-question">Which model is best suited for fast, high-volume classification tasks?</p>

    <form class="quiz-form" id="quiz-form">
      <label class="answer-option" id="answer-a"><input type="radio" name="answer" value="a" />Claude Opus — for the longest reasoning chains</label>
      <label class="answer-option" id="answer-b"><input type="radio" name="answer" value="b" />Claude Haiku — for high-throughput, low-latency tasks</label>
      <label class="answer-option" id="answer-c"><input type="radio" name="answer" value="c" />Claude Sonnet — balanced general-purpose model</label>
      <label class="answer-option" id="answer-d"><input type="radio" name="answer" value="d" />None of the above</label>
    </form>
  </main>
</body>
</html>
